swagger: "2.0"
# Intentionally-insecure Swagger 2.0 doc used to prove the OWASP ruleset fires
# on 2.0 with parity to the 3.x insecure fixture. It deliberately violates as
# many rules as possible.
info:
  title: Insecure Widgets API (Swagger 2.0)
  # NOTE: info.version is intentionally omitted -> API9
  description: A deliberately insecure Swagger 2.0 API for testing the OWASP ruleset.
  # NOTE: info.contact intentionally omitted -> API9
host: api.example.com   # example.com host -> API9
basePath: /v1
schemes:
  - http                # plaintext http scheme -> API8
# NOTE: no top-level `security` -> API5
paths:
  /widgets:
    get:
      # NOTE: no operationId, no description -> API9 ; no security -> API1
      produces:
        - application/json
      responses:
        '200':
          description: A list of widgets
          # NOTE: no schema on a 2xx response -> API3 (BOPLA)
    post:
      # NOTE: no security -> API1 ; no 429 -> API6 ; no operationId/description -> API9
      consumes:
        - application/json
      parameters:
        - name: body
          in: body
          # NOTE: body parameter with no schema -> API3 (mass assignment)
      responses:
        '201':
          description: Created
  /widgets/{widgetId}:
    get:
      # NOTE: exposes an object id with no security -> API1 (BOLA proxy)
      produces:
        - application/json
      parameters:
        - name: widgetId
          in: path
          required: true
          type: string   # inline param, no maxLength -> API4
      responses:
        '200':
          description: A widget
          schema:
            $ref: '#/definitions/Widget'
externalDocs:
  url: http://docs.example.com   # http:// -> API10
securityDefinitions:
  apiKeyQuery:
    type: apiKey
    in: query            # API key in URL query -> API2
    name: api_key
  basicAuth:
    type: basic          # HTTP Basic -> API2
  oauth2:
    type: oauth2
    flow: accessCode
    authorizationUrl: http://auth.example.com/authorize  # http -> API2
    tokenUrl: http://auth.example.com/token              # http -> API2
    scopes: {}
definitions:
  Widget:
    type: object
    properties:
      id:
        type: string          # no maxLength -> API4
      tags:
        type: array           # no maxItems -> API4
        items:
          type: string        # no maxLength -> API4
      quantity:
        type: integer         # no maximum -> API4
      callbackUrl:
        type: string          # url-ish name, no format -> API7
